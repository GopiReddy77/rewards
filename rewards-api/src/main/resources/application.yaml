spring:
  application:
    name: rewards-api

  datasource:
    url: jdbc:mysql://localhost:3306/rewards_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: rewards_user
    password: Admin123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # or none, depending on whether you want Hibernate to manage schema
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
