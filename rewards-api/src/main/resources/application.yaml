spring:
  application:
    name: rewards-api

  datasource:
    url: jdbc:h2:mem:rewardsdb   # ✅ In-memory H2 database
    driver-class-name: org.h2.Driver
    username: sa
    password:                   # H2 default has no password

  jpa:
    hibernate:
      ddl-auto: update          # still works with H2
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true             # ✅ Enables web console at /h2-console
